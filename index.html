<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZipCompressor</title>
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABEAAAARCAYAAAA7bUf6AAAA8ElEQVR4AYySMQ5BQRRFUaAQu9HQaBQ6IkFpCWrrsACJQqEiRBTCIuxEpeLciRnf9ybz5Z6ZeX/eO/lBpfT9vDjGeHDXAjNZiRrKLB6OJX9uUByhA3/JS3yD3kgCX2sfsxygDT+JSSSQKNt8oxiC3qjLHhKTSCBRaPwcvGhHHUQxiQQS0RuiWlx50oQTuMQkapbINbHonKfOc5eYRAMSuabUEpNIIFFq3t1bkho3U9BPWmVPxpJsmRrACNaQjCXpMTWDOfQhGUtyZmoFF1hCMpZkwtQe9J0s2JOxJE+mNnCHQrEkhQazTXmJ/h9FCZ43AAAA///x/U7KAAAABklEQVQDAL8ULxYOlLMyAAAAAElFTkSuQmCC">
    <link rel="stylesheet" href="style.css">
 <style>
</style>
</head>
<body>

    <header>
        <div class="logo">
            <svg width="28px" height="28px" viewBox="0 0 17 17" version="1.1" xmlns="http://www.w3.org/2000/svg" fill="none" xmlns:xlink="http://www.w3.org/1999/xlink">	<path d="M9.667 0h-7.667v17h13v-11.692l-5.333-5.308zM10 1.742l3.273 3.258h-3.273v-3.258zM3 16v-15h3v1h1v-1h2v5h5v10h-11zM5 8h1v1h-1v-1zM6 8v-1h1v1h-1zM6 6v-1h1v1h-1zM5 6h1v1h-1v-1zM5 4h1v1h-1v-1zM6 4v-1h1v1h-1zM5 2h1v1h-1v-1zM6 9.389c-1.103 0-2 0.897-2 2s0.897 2 2 2c0.062 0 0.121-0.007 0.219-0.020 0.646-0.071 1.218-0.455 1.531-1.026 0.166-0.303 0.25-0.624 0.25-0.954 0-1.103-0.897-2-2-2zM6.873 11.864c-0.156 0.285-0.441 0.477-0.762 0.512l-0.112 0.014c-0.551 0-0.999-0.449-0.999-1s0.449-1 1-1 1 0.449 1 1c0 0.159-0.043 0.319-0.127 0.474z" fill="currentcolor"/></svg>
            <span>ZipCompressor</span>
        </div>
   <button class="lang-btn" id="lang-toggle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            <span id="lang-text">EN</span>
        </button>
    </header>

    <main>
        <div class="dropzone" id="dropzone">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <p id="txt-drop">Arraste arquivos ou clique para upload</p>
            <span id="txt-sub">Suporta múltiplos arquivos simultâneos</span>
            <input type="file" id="file-input" multiple>
        </div>

        <div class="file-list" id="file-list"></div>

        <div class="preview-bar" id="preview-bar" style="display: none;">
           <div class="compression-settings">
    <div class="radio-tabs">
        <label class="tab-item">
            <input type="radio" name="comp-level" value="0">
            <span id="lbl-c0">Sem compressão</span>
        </label>
        <label class="tab-item">
            <input type="radio" name="comp-level" value="6" checked>
            <span id="lbl-c6">Média</span>
        </label>
        <label class="tab-item">
            <input type="radio" name="comp-level" value="9">
            <span id="lbl-c9">Máxima</span>
        </label>
    </div>
</div>
            <div class="total-info">
                <span id="txt-total">Tamanho Final (ZIP):</span>
                <div>
                    <span id="total-size">0 KB</span>
                    <div class="saved-space" id="saved-space"></div>
                </div>
            </div>
            <button class="btn-compress" id="btn-compress">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                <span id="txt-btn">Baixar Arquivo .ZIP</span>
            </button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
