<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioMeta Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="player.css">
</head>
<body>

    <header>
        <div class="logo">AudioMeta <span>Pro</span></div>
        <div class="controls-wrapper" style="display: flex; align-items: center; gap: 1rem;">
            <!-- Botão Alternador de Temas Claro/Escuro -->
            <button id="btn-theme" class="theme-toggle-btn" title="Alternar Tema" style="background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 0.5rem; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px;">
                <!-- Ícone do Sol (Visível no Modo Dark) -->
                <svg id="svg-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <!-- Ícone da Lua (Visível no Modo Light) -->
                <svg id="svg-moon" class="field-hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>

            <!-- Alternador de Idiomas -->
            <div class="lang-selector">
                <button id="btn-pt" class="active">PT</button>
                <button id="btn-en">EN</button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Zona Profissional de Upload e Drop de Arquivos -->
        <section class="drop-zone" id="drop-zone">
            <svg viewBox="0 0 24 24" width="48" height="48"><path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
            <p id="txt-drop">Arraste seu MP3 aqui ou clique para buscar</p>
            <input type="file" id="file-input" accept="audio/mp3, audio/mpeg" hidden>
        </section>

        <!-- Painel de Exibição dos Metadados Principais Limpos -->
        <section class="meta-container field-hidden" id="meta-container">
            <div class="meta-card">
                <div class="cover-wrapper">
                    <div class="no-cover" id="default-cover">
                        <svg viewBox="0 0 24 24" width="64" height="64"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14H11V12H13V16ZM13 10H11V8H13V10Z"/></svg>
                    </div>
                    <img id="cover-art" alt="Cover Art" class="field-hidden">
                </div>
                <div class="meta-info">
                    <h2 id="txt-meta-title">Metadados Extraídos</h2>
                    <div class="info-grid">
                        <div class="info-item"><span class="label" id="lbl-title">Título</span><span class="val" id="val-title">-</span></div>
                        <div class="info-item"><span class="label" id="lbl-artist">Artista</span><span class="val" id="val-artist">-</span></div>
                        <div class="info-item"><span class="label" id="lbl-album">Álbum</span><span class="val" id="val-album">-</span></div>
                        <div class="info-item"><span class="label" id="lbl-year">Ano</span><span class="val" id="val-year">-</span></div>
                        <div class="info-item"><span class="label" id="lbl-genre">Gênero</span><span class="val" id="val-genre">-</span></div>
                        <div class="info-item"><span class="label" id="lbl-track">Faixa</span><span class="val" id="val-track">-</span></div>
                    </div>
                </div>
            </div>

            <!-- Painel de Exibição das Letras Extraídas -->
            <div class="extended-meta-card field-hidden" id="lyrics-card">
                <h3 id="txt-lyrics-title">Letras da Música</h3>
                <div class="lyrics-content" id="lyrics-text"></div>
            </div>

            <!-- Painel de Dados Técnicos Físicos do Áudio -->
            <div class="extended-meta-card" id="tech-card">
                <h3 id="txt-tech-title">Propriedades Técnicas do Arquivo</h3>
                <div class="extended-list" id="tech-list">
                    <div class="extended-item"><span class="extended-key" id="lbl-bitrate">Taxa de Bits</span><span class="extended-val" id="val-bitrate">-</span></div>
                    <div class="extended-item"><span class="extended-key" id="lbl-frequency">Frequência</span><span class="extended-val" id="val-frequency">-</span></div>
                    <div class="extended-item"><span class="extended-key" id="lbl-channels">Canais</span><span class="extended-val" id="val-channels">-</span></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Componente Fixo Inferior do Player de Áudio Dark/Light Customizado -->
    <div class="audio-player" id="audio-player">
        <audio id="main-audio"></audio>
        <div class="player-grid">
            
            <!-- Zona Esquerda: Capa de Álbum Miniatura e Rótulos Sincronizados -->
            <div class="player-track-info">
                <img id="player-thumb" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' viewBox='0 0 24 24' fill='%2364748b'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z'/></svg>" alt="">
                <div>
                    <div class="player-title" id="player-title">Nenhuma música</div>
                    <div class="player-artist" id="player-artist">Aguardando arquivo</div>
                </div>
            </div>
            
            <!-- Zona Central: Controles de Pulo e Linha de Progresso Baseada em Camadas -->
            <div class="player-controls">
                <div class="control-buttons">
                    <button id="btn-rewind" title="Voltar 10s">
                        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12.5 3C17.15 3 21 6.85 21 11.5S17.15 20 12.5 20 4 16.15 4 11.5h2c0 3.58 2.92 6.5 6.5 6.5s6.5-2.92 6.5-6.5-2.92-6.5-6.5-6.5c-2.22 0-4.17 1.11-5.35 2.8L10 6H4v6h6L7.54 9.54C9 7.61 10.61 5 12.5 3zm-2.3 11.8V11h-.8v-.7h1.7v4.5h-.9zm3.1-.1c-.6 0-1-.4-1-1.1v-1.6c0-.7.4-1.1 1-1.1s1 .4 1 1.1v1.6c0 .7-.4 1.1-1 1.1zm0-.7c.2 0 .3-.2.3-.5v-1.6c0-.3-.1-.5-.3-.5s-.3.2-.3.5v-1.6c0 .3.1.5.3.5z"/></svg>
                    </button>
                    <button id="btn-play" class="play-main">
                        <svg id="svg-play" viewBox="0 0 24 24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                        <svg id="svg-pause" class="field-hidden" viewBox="0 0 24 24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button id="btn-forward" title="Avançar 10s">
                        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M11.5 3C6.85 3 3 6.85 3 11.5S6.85 20 11.5 20s8.5-3.85 8.5-8.5h-2c0 3.58-2.92 6.5-6.5 6.5s-6.5-2.92-6.5-6.5 2.92-6.5 6.5-6.5c2.22 0 4.17 1.11 5.35 2.8L14 12h6V6h-2.46l2.46 2.54C18.5 6.61 15.39 3 11.5 3zm-2.3 11.8V11h-.8v-.7h1.7v4.5h-.9zm3.1-.1c-.6 0-1-.4-1-1.1v-1.6c0-.7.4-1.1 1-1.1s1 .4 1 1.1v1.6c0 .7-.4 1.1-1 1.1zm0-.7c.2 0 .3-.2.3-.5v-1.6c0-.3-.1-.5-.3-.5s-.3.2-.3.5v-1.6c0 .3.1.5.3.5z"/></svg>
                    </button>
                </div>
                <div class="progress-container">
                    <span id="time-current">0:00</span>
                    <div class="custom-slider" id="seek-slider">
                        <div class="slider-track"></div>
                        <div class="slider-fill" id="seek-fill"></div>
                        <div class="slider-thumb" id="seek-thumb"></div>
                    </div>
                    <span id="time-total">0:00</span>
                </div>
            </div>
            
            <!-- Zona Direita: Controle e Slider de Volume Customizado -->
            <div class="volume-container">
                <button id="btn-mute">
                    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                </button>
                <div class="custom-slider volume-slider-width" id="volume-slider">
                    <div class="slider-track"></div>
                    <div class="slider-fill" id="volume-fill"></div>
                    <div class="slider-thumb" id="volume-thumb"></div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Scripts Separados de Camadas Isoladas -->
    <script src="app.js"></script>
    <script src="player.js"></script>
</body>
</html>
